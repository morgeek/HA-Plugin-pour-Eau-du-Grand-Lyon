# ═══════════════════════════════════════════════════════════════════
#  Dashboard "Eau du Grand Lyon" — Lovelace YAML (Version PLATINUM 2.5.0)
# ═══════════════════════════════════════════════════════════════════
#
#  Ce dashboard regroupe toutes les fonctions d'intelligence, d'écologie
#  et de sécurité de la version 2.5.0 (Hardening & Features Pack).
#
#  Note : Les noms d'entités peuvent varier selon votre configuration.
# ═══════════════════════════════════════════════════════════════════

title: 💧 Eau du Grand Lyon PLATINUM
views:
  - title: Synthèse
    icon: mdi:water
    cards:

      # ── RÉSUMÉ QUOTIDIEN (NOUVEAU) ───────────────────────────────
      - type: horizontal-stack
        cards:
          - type: sensor
            entity: sensor.eau_du_grand_lyon_conso_hier
            name: Hier (L)
            graph: line
          - type: sensor
            entity: sensor.eau_du_grand_lyon_conso_moyenne_7j
            name: Moyenne (L/j)
            graph: line

      # ── RÉSUMÉ FINANCIER & CONSO ──────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: sensor
            entity: sensor.eau_du_grand_lyon_consommation_mois_courant
            name: Ce mois
            graph: line
          - type: sensor
            entity: sensor.eau_du_grand_lyon_cout_mois_courant_eur
            name: Coût estimé
            graph: line

      # ── INTELLIGENCE & ÉCONOMIE ───────────────────────────────────
      - type: entities
        title: 🧠 Intelligence & Économie
        show_header_toggle: false
        entities:
          - entity: sensor.eau_du_grand_lyon_conseil_eco_coach
            name: Eco-Coach (Conseil)
          - entity: sensor.eau_du_grand_lyon_tendance_vs_n_1
            name: Tendance vs N-1
          - entity: sensor.eau_du_grand_lyon_economie_potentielle
            name: Économie vs N-1 (€)
          - entity: sensor.eau_du_grand_lyon_prediction_consommation_mois
            name: Prédiction volume (m³)
          - type: divider
          - entity: sensor.eau_du_grand_lyon_eco_score_m3_pers_mois
            name: Eco-Score (Performance)
          - entity: sensor.eau_du_grand_lyon_empreinte_co2
            name: Impact CO2 (kg CO2e)

      # ── QUALITÉ DE L'EAU (OPEN DATA) ─────────────────────────────
      - type: entities
        title: 🔬 Qualité de l'Eau (Open Data)
        show_header_toggle: false
        entities:
          - entity: sensor.eau_du_grand_lyon_durete_de_l_eau_open_data
            name: Dureté réelle (°fH)
          - entity: sensor.eau_du_grand_lyon_nitrates_open_data
            name: Nitrates (mg/L)
          - entity: sensor.eau_du_grand_lyon_chlore_residuel_open_data
            name: Chlore (mg/L)

      # ── MAINTENANCE & CALCAIRE ───────────────────────────────────
      - type: entities
        title: 🧱 Entretien & Calcaire
        show_header_toggle: false
        entities:
          - entity: sensor.eau_du_grand_lyon_calcaire_cumule
            name: Calcaire cumulé (est.)
          - entity: binary_sensor.eau_du_grand_lyon_alerte_maintenance_calcaire
            name: État maintenance
          - entity: sensor.eau_du_grand_lyon_index_journalier_energy
            name: Index journalier (Suivi)

      # ── SÉCURITÉ & RESTRICTIONS ──────────────────────────────────
      - type: vertical-stack
        cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: entity
                entity: sensor.eau_du_grand_lyon_niveau_de_secheresse
                name: Sécheresse (69)
              - type: entity
                entity: switch.eau_du_grand_lyon_mode_vacances
                name: Mode Vacances
          
          - type: conditional
            conditions:
              - entity: switch.eau_du_grand_lyon_mode_vacances
                state: "on"
            card:
              type: markdown
              content: >
                ### 🛡️ Surveillance Vacances Active
                Toute consommation > 1L déclenchera une alerte critique.

      # ── GESTION DES FACTURES ─────────────────────────────────────
      - type: entities
        title: 📄 Facturation & Services
        show_header_toggle: false
        entities:
          - entity: sensor.eau_du_grand_lyon_derniere_facture
            name: Date dernière facture
          - entity: button.eau_du_grand_lyon_telecharger_la_derniere_facture
            name: Télécharger le PDF (v2.5)

      # ── ALERTES FUITES ───────────────────────────────────────────
      - type: entities
        title: ⚠️ Détection de fuites
        show_header_toggle: false
        entities:
          - entity: binary_sensor.eau_du_grand_lyon_detection_fuite_teleo
            name: Fuite officielle (Téléo)
          - entity: binary_sensor.eau_du_grand_lyon_alerte_fuite_pattern_local
            name: Analyse locale (Pattern)
          - entity: binary_sensor.eau_du_grand_lyon_interruption_de_service_travaux_coupure
            name: Alerte Coupure / Travaux

      # ── DIAGNOSTICS & COMPTABILITÉ ──────────────────────────────
      - type: entities
        title: 🔧 Santé & Compatibilité
        show_header_toggle: false
        entities:
          - entity: sensor.eau_du_grand_lyon_compatibilite_compteur
            name: Type de compteur
          - entity: sensor.eau_du_grand_lyon_signal_teleo
            name: Signal radio module
          - entity: binary_sensor.eau_du_grand_lyon_batterie_module_teleo
            name: État de la pile module

      # ── ÉCHÉANCES & CALENDRIER ───────────────────────────────────
      - type: calendar
        entities:
          - calendar.eau_du_grand_lyon_echeances_facturation
        initial_view: list

      # ── GRAPH HISTORIQUE ─────────────────────────────────────────
      - type: statistics-graph
        title: Historique 24 mois
        entities:
          - entity: sensor.eau_du_grand_lyon_index_journalier_energy
        stat_types:
          - change
        period: month
        chart_type: bar
        days_to_show: 730
