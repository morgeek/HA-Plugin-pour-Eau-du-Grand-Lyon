blueprint:
  name: "🌵 Eau Grand Lyon — Alerte Niveau Sécheresse"
  description: >
    Envoie une notification quand le niveau de sécheresse change (ex: passage de
    "Normal" à "Vigilance"). Vous rappelle les restrictions d'usage de l'eau en
    vigueur dans votre département.
  domain: automation
  source_url: https://github.com/Morgeek/eau_grand_lyon
  input:
    sensor_secheresse:
      name: Capteur Niveau de Sécheresse
      description: >
        Sélectionnez le sensor "Niveau de sécheresse" de l'intégration
        Eau du Grand Lyon.
      selector:
        entity:
          integration: eau_grand_lyon
          domain: sensor
    niveaux_alertes:
      name: Niveaux déclenchant une notification
      description: "Sélectionnez les niveaux qui doivent envoyer une alerte"
      default:
        - "Vigilance"
        - "Alerte"
        - "Alerte renforcée"
        - "Crise"
      selector:
        select:
          multiple: true
          options:
            - "Vigilance"
            - "Alerte"
            - "Alerte renforcée"
            - "Crise"
    service_notification:
      name: Service de notification
      description: "Nom du service de notification (ex: notify.mobile_app_iphone)"
      selector:
        select:
          custom_value: true
          options: []

variables:
  sensor_entity: !input sensor_secheresse
  niveau_actuel: "{{ states(sensor_entity) }}"
  niveaux: !input niveaux_alertes

trigger:
  - platform: state
    entity_id: !input sensor_secheresse

condition:
  - condition: template
    value_template: "{{ niveau_actuel in niveaux }}"
  - condition: template
    value_template: "{{ trigger.from_state.state != trigger.to_state.state }}"

action:
  - service: !input service_notification
    data:
      title: "🌵 Alerte Sécheresse — {{ niveau_actuel }}"
      message: >
        Le niveau de sécheresse dans votre zone vient de passer à **{{ niveau_actuel }}**.

        ⚠️ Des restrictions d'usage de l'eau peuvent s'appliquer :
        - 🚫 Arrosage de jardins (heures creuses ou interdit)
        - 🚫 Lavage de véhicules
        - 🚫 Remplissage de piscines

        Consultez les restrictions en vigueur sur le site de la préfecture du Rhône
        ou sur https://agence.eaudugrandlyon.com

        💡 Pensez à réduire votre consommation pour préserver la ressource.
      data:
        tag: eau_grand_lyon_secheresse
        actions:
          - action: URI
            title: "📋 Restrictions en vigueur"
            uri: https://www.rhone.gouv.fr
          - action: URI
            title: "🌐 Espace client"
            uri: https://agence.eaudugrandlyon.com

mode: single
max_exceeded: silent
