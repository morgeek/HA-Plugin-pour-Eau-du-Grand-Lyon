# Configuration du tableau de bord Énergie Home Assistant
# pour l'intégration Eau du Grand Lyon (v2.5.0)
#
# À ajouter dans l'interface Home Assistant :
# Paramètres > Tableaux de bord > Énergie > Eau

# Sources d'eau recommandées :
# ------------------------------------------------------------------

# Option 1 (Recommandé pour compteurs Téléo/TIC) :
# Utilise l'index journalier pour une précision optimale.
# Entity ID : sensor.eau_du_grand_lyon_index_journalier_energy

# Option 2 (Pour compteurs standards / relève manuelle) :
# Utilise l'index cumulatif mensuel.
# Entity ID : sensor.eau_du_grand_lyon_index_compteur

# Coûts associés :
# ------------------------------------------------------------------
# Vous pouvez utiliser le capteur de coût Énergie dédié :
# Entity ID : sensor.eau_du_grand_lyon_cout_energie

# Note : Si ces capteurs sont grisés, assurez-vous de les avoir 
# ACTIVÉS dans Paramètres > Appareils et services > Eau du Grand Lyon.